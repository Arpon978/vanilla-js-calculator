<!DOCTYPE html>
<html>
  <head>
    <title>calculator</title>
    <link rel="stylesheet" href="calculator.css">
  </head>
  <body>
    
     <p class="js-calculation"></p>
    <p>
      <button onclick="
        updateCalculation('1');
      " class="number-button">1</button>

      <button onclick="
        updateCalculation('2');
      " class="number-button">2</button>

      <button onclick="
        updateCalculation('3');
      " class="number-button">3</button>

      <button onclick="
        updateCalculation(' + ');
      " class="symbol">+</button>
    </p>

    <p>
      <button onclick="
        updateCalculation('4');
      " class="number-button">4</button>

      <button onclick="
        updateCalculation('5');
      " class="number-button">5</button>

      <button onclick="
        updateCalculation('6');
      " class="number-button">6</button>

      <button onclick="
        updateCalculation(' - ');
      " class="symbol">-</button>
    </p>

    <p>
      <button onclick="
        updateCalculation('7');
      " class="number-button">7</button>

      <button onclick="
        updateCalculation('8');
      " class="number-button">8</button>

      <button onclick="
        updateCalculation('9');
      " class="number-button">9</button>

      <button onclick="
        updateCalculation(' * ');
      " class="symbol">*</button>
    </p>

    <p>
      <button onclick="
        updateCalculation('0');
      " class="number-button">0</button>
          
      <button onclick="
        updateCalculation('.');
      " class="number-button">.</button>

      <button onclick="
        calculation = eval(calculation);
       displayCalculation();

        localStorage.setItem('calculation', calculation);
      " class="symbol">=</button>

      <button onclick="
        updateCalculation(' / ');
      " class="symbol">/</button>
    </p>

    <p>
      <button onclick="
        calculation = '';
       displayCalculation();

        localStorage.setItem('calculation', calculation);
      " class="clear-button">Clear</button>
    </p>
    <script>
      let calculation = localStorage.getItem('calculation') || '';

      displayCalculation();

      function updateCalculation(value) {
        calculation += value;
        displayCalculation();
        localStorage.setItem('calculation', calculation);
      }

      function displayCalculation(){
      document.querySelector('.js-calculation')
        .innerHTML = calculation;
      }
    </script>
  </body>
</html>
